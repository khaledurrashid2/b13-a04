<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Job Application Tracker</title>
</head>
<body class="min-h-screen">

  <div class="max-w-4xl mx-auto px-3 sm:px-6 py-6 sm:py-10">

    <!-- Title -->
    <h1 class="text-2xl sm:text-3xl font-extrabold text-[#0f2a55] mb-6">
      Job Application Tracker
    </h1>

    <!-- Section showing total jobs in three different tabs -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="stat-card px-5 py-4">
        <p class="text-sm text-gray-500 mb-1">Total</p>
        <p class="text-3xl font-bold text-[#0f2a55]" id="stat-total">0</p>
      </div>
      <div class="stat-card px-5 py-4">
        <p class="text-sm text-gray-500 mb-1">Interview</p>
        <p class="text-3xl font-bold text-green-500" id="stat-interview">0</p>
      </div>
      <div class="stat-card px-5 py-4">
        <p class="text-sm text-gray-500 mb-1">Rejected</p>
        <p class="text-3xl font-bold text-red-500" id="stat-rejected">0</p>
      </div>
    </div>

    <hr class="border-gray-200 mb-6" />

    <!-- Section heading -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg sm:text-xl font-bold text-[#0f2a55]">Available Jobs</h2>
      <span class="text-sm text-gray-500" id="jobs-count">0 jobs</span>
    </div>

    <!-- Three jobs tabs -->
    <div class="flex gap-2 mb-4">
      <button class="filter-tab active" onclick="setFilter('All', this)">All</button>
      <button class="filter-tab" onclick="setFilter('Interview', this)">Interview</button>
      <button class="filter-tab" onclick="setFilter('Rejected', this)">Rejected</button>
    </div>

    <!-- job list -->
    <div class="job-list-container" id="jobList"></div>

    <!-- Empty tabs when they are initially created -->
    <div id="emptyState" class="hidden job-list-container py-20 flex-col items-center justify-center text-center">
      <img src="./assets/document-icon.png" alt="document icon" class="w-[72px] h-[72px]" >
      <p class="text-lg font-bold text-[#0f2a55] mb-1">No jobs available</p>
      <p class="text-sm text-gray-400">Check back soon for new job opportunities</p>
    </div>

  </div>
    
   <script src="scripts.js"></script>
</body>
</html>
